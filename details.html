<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل المحتوى | ايفون نت</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Cairo;
background:#07111f;
color:white;
}

.container{
padding:15px;
}

.videoBox{
width:100%;
aspect-ratio:16/9;
border-radius:18px;
overflow:hidden;
background:#000;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.videoBox iframe{
width:100%;
height:100%;
border:none;
}

.card{
background:#0d1b2d;
padding:15px;
border-radius:16px;
margin-top:15px;
}

.title{
font-size:22px;
font-weight:800;
color:#18e0d0;
}

.desc{
color:#b4bfd1;
margin-top:10px;
line-height:1.8;
}

.btn{
margin-top:15px;
padding:12px;
border:none;
border-radius:12px;
width:100%;
font-weight:bold;
cursor:pointer;
background:linear-gradient(135deg,#18e0d0,#6b6cff);
color:white;
}

.lock{
position:relative;
}

.blur{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
backdrop-filter:blur(10px);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:10px;
border-radius:18px;
}

.badge{
background:#ffcc00;
color:#000;
padding:5px 10px;
border-radius:8px;
font-size:12px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div id="content"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyAwe6GCjWD6JgoU2_CVsUL5Uonat3JRenk",
authDomain: "ifon-net.firebaseapp.com",
databaseURL: "https://ifon-net-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "ifon-net"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* GET ID */
const id = new URLSearchParams(location.search).get("id");

/* USER */
const uid = localStorage.getItem("ifon_uid");

/* LOAD USER + CONTENT */
async function load(){

let userPlan = "free";

/* user plan */
if(uid){
const usnap = await db.ref("users/"+uid).once("value");
const user = usnap.val();
if(user) userPlan = user.plan || "free";
}

/* content */
db.ref("content/"+id).once("value", snap=>{
const data = snap.val();

if(!data){
document.getElementById("content").innerHTML = "لا يوجد محتوى";
return;
}

/* views +1 */
db.ref("content/"+id+"/views").transaction(v => (v||0)+1);

/* premium lock */
let locked = false;

if(data.publish === "premium" && userPlan !== "premium"){
locked = true;
}

/* render */
document.getElementById("content").innerHTML = `

<div class="videoBox">
<iframe src="${data.video || ''}" allowfullscreen></iframe>
</div>

<div class="card">
<div class="title">${data.title || ""}</div>
<div class="desc">${data.desc || ""}</div>

<div style="margin-top:10px;color:#9ca3af;font-size:13px">
👁 المشاهدات: ${data.views || 0}
</div>
</div>

${
locked ? `
<div class="card lock">
<div class="blur">
<div class="badge">محتوى مدفوع</div>
<button class="btn" onclick="openWhatsApp()">
اشترك الآن عبر واتساب
</button>
</div>
</div>
` : ""
}

`;

});
}

function openWhatsApp(){
window.open(
"https://wa.me/967771746373?text=اريد%20اشتراك%20ايفون%20نت",
"_blank"
);
}

load();
</script>

</body>
</html>
