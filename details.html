<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل المحتوى | ايفون نت</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Cairo;
background:#07111f;
color:white;
}

.container{
padding:15px;
max-width:800px;
margin:auto;
}

.videoBox{
width:100%;
aspect-ratio:16/9;
background:black;
border-radius:18px;
overflow:hidden;
position:relative;
}

iframe{
width:100%;
height:100%;
border:none;
}

.card{
background:#0d1b2d;
padding:15px;
border-radius:16px;
margin-top:15px;
}

.title{
font-size:22px;
font-weight:800;
color:#18e0d0;
}

.desc{
color:#b4bfd1;
margin-top:10px;
line-height:1.8;
}

.badge{
display:inline-block;
background:#ffcc00;
color:black;
padding:4px 10px;
border-radius:8px;
font-size:12px;
font-weight:bold;
}

.lockScreen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
backdrop-filter:blur(12px);
background:rgba(0,0,0,0.4);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
gap:10px;
z-index:10;
}

.btn{
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#18e0d0,#6b6cff);
color:white;
font-weight:bold;
cursor:pointer;
width:80%;
}
</style>
</head>

<body>

<div class="container">
<div id="content"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyAwe6GCjWD6JgoU2_CVsUL5Uonat3JRenk",
authDomain: "ifon-net.firebaseapp.com",
databaseURL: "https://ifon-net-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "ifon-net"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const id = new URLSearchParams(location.search).get("id");
const uid = localStorage.getItem("ifon_uid");

let videoStarted = false;
let timer = null;

async function load(){

let userPlan = "free";

if(uid){
const snap = await db.ref("users/"+uid).once("value");
const user = snap.val();
if(user) userPlan = user.plan || "free";
}

db.ref("content/"+id).once("value", snap=>{

const data = snap.val();
if(!data){
document.getElementById("content").innerHTML = "لا يوجد محتوى";
return;
}

/* زيادة مشاهدات */
db.ref("content/"+id+"/views").transaction(v => (v||0)+1);

/* تحديد إذا مدفوع */
const isPremium = data.publish === "premium";
const blocked = isPremium && userPlan !== "premium";

/* واجهة الفيديو */
document.getElementById("content").innerHTML = `

<div class="videoBox">
<iframe id="videoFrame" src="${data.video || ''}" allowfullscreen></iframe>

${blocked ? `
<div class="lockScreen">
<div class="badge">🔒 محتوى مدفوع</div>
<button class="btn" onclick="openSubscribe()">
اشترك الآن
</button>
</div>
` : ``}

</div>

<div class="card">
<div class="title">${data.title}</div>
<div class="desc">${data.desc}</div>

<div style="margin-top:10px;font-size:13px;color:#9ca3af">
👁 ${data.views || 0} مشاهدة
</div>
</div>

`;

/* تشغيل 30 ثانية فقط للمحتوى المدفوع */
if(blocked){
start30SecLimit();
}

});

}

/* ⛔ تشغيل 30 ثانية */
function start30SecLimit(){
const frame = document.getElementById("videoFrame");

if(!frame) return;

timer = setTimeout(()=>{
frame.src = "";
openSubscribe();
}, 30000);
}

/* صفحة الاشتراك */
function openSubscribe(){
window.location.href =
"https://wa.me/967771746373?text=اريد%20اشتراك%20ايفون%20نت";
}

load();
</script>

</body>
</html>
